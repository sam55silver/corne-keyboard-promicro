# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y
#

CONFIG_ZMK_KEYBOARD_NAME="CorneKey"

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Bluetooth - max connections set to 6 (5 usable profiles + 1 for right half)
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# Bluetooth - increase TX power for better connection reliability (nRF52840 max)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetooth - experimental connection stability improvements (disables 2M PHY)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ZMK Studio
CONFIG_ZMK_STUDIO_LOCKING=n
